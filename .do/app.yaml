# DigitalOcean App Platform spec — Opossum Dev (static Nuxt site)
# -----------------------------------------------------------------------------
# App Platform terminates TLS at its edge and serves from its CDN, so the
# Dockerfile + nginx/ setup is NOT used here — that stack is the Droplet path
# (it owns TLS itself, which is what caused the "400: plain HTTP request was
# sent to HTTPS port" when App Platform spoke plain HTTP to nginx's :443).
#
# This declares the component as a STATIC SITE: App Platform runs the Node
# buildpack, executes `npm run generate`, and serves `.output/public`.
#
# Apply it one of two ways:
#   1) doctl apps update <APP_ID> --spec .do/app.yaml
#   2) DO console -> your app -> Settings -> App Spec -> paste -> Save
# (Find <APP_ID> with: doctl apps list)
#
# NOTE: your current app's single component is a Dockerfile *service*. Changing
# it to a static_site may require DO to recreate the component; if the update is
# rejected, delete the app and create a fresh one from this spec:
#   doctl apps create --spec .do/app.yaml
# -----------------------------------------------------------------------------

name: opossum-dev

# region must match your existing app's region (omit when creating fresh and DO
# will pick one). List options: doctl apps list  /  common: ams, fra, nyc, sfo.
# region: fra

static_sites:
  - name: web
    github:
      repo: egorshubin/opossum-dev
      branch: main
      deploy_on_push: true

    environment_slug: node-js
    build_command: npm run generate
    output_dir: .output/public

    # Multi-page prerendered site (not an SPA): serve real files, real 404s.
    index_document: index.html
    error_document: 404.html
    # Intentionally NO catchall_document — a catchall would mask 404s.

# Custom domains. Safe to leave in; DO marks them pending until DNS/cert resolve.
# Cloudflare note: set these records to DNS-only (grey cloud) at least until DO
# issues its cert, otherwise Cloudflare's proxy can block DO's domain validation.
domains:
  - domain: opossum-dev.com
    type: PRIMARY
  - domain: www.opossum-dev.com
    type: ALIAS
