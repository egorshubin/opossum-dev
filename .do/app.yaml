# DigitalOcean App Platform spec — Opossum Dev (nginx Web Service).
# -----------------------------------------------------------------------------
# Builds the Dockerfile and runs nginx as a Web Service. App Platform
# terminates TLS at its edge and forwards plain HTTP to the container's
# http_port (8080) — which is why nginx/default.conf listens on 8080 with NO
# SSL. (Listening on :443 ssl was what produced the 400.)
#
# Apply via the DO console -> your app -> Settings -> App Spec -> paste -> Save,
# or:  doctl apps update <APP_ID> --spec .do/app.yaml
#
# Note: a Web Service is a paid component (~$5/mo, no static CDN). A free
# Static Site + Cloudflare Redirect Rules would do the same SEO redirects at $0.
# -----------------------------------------------------------------------------

name: opossum-dev-site
region: nyc

services:
  - name: web
    github:
      repo: egorshubin/opossum-dev
      branch: main
      deploy_on_push: true

    dockerfile_path: Dockerfile
    http_port: 8080            # MUST match `listen 8080` in nginx/default.conf

    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb   # smallest Basic tier

    health_check:
      http_path: /             # serves index.html -> 200, so health checks pass

domains:
  - domain: opossum-dev.com
    type: PRIMARY
  - domain: www.opossum-dev.com
    type: ALIAS
