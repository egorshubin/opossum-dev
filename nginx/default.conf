# ---------------------------------------------------------------------------
# Opossum Dev — static Nuxt site served by Nginx on DigitalOcean App Platform.
#
# App Platform terminates TLS at its edge and forwards *plain HTTP* to this
# container on the configured Public HTTP Port (443). We listen on 443 as a
# PLAIN HTTP server (note: NO `ssl` keyword) — `listen 443 ssl` receiving plain
# HTTP was the original "400: plain HTTP request sent to HTTPS port".
# App Platform also auto-redirects HTTP->HTTPS at the edge, so we don't.
#
# Canonical URL form: https://opossum-dev.com/<path>/  (apex, trailing slash,
# no .html). The SEO redirects below collapse duplicates onto it.
# ---------------------------------------------------------------------------
server {
    listen 443;       # plain HTTP on 443 (NOT `listen 443 ssl`)
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Security + compression
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml font/woff font/woff2;

    # --- SEO redirects: collapse duplicates onto the canonical URL ---
    # CRITICAL: these match $request_uri (the ORIGINAL client URI), NOT
    # `location` blocks. The `index` directive internally rewrites "/" ->
    # "/index.html"; a `location = /index.html` redirect would catch that
    # internal rewrite and redirect the homepage to itself forever
    # (ERR_TOO_MANY_REDIRECTS). $request_uri is immune to internal rewrites,
    # so these fire only on genuine client requests.

    # www -> apex
    if ($host = www.opossum-dev.com) {
        return 301 https://opossum-dev.com$request_uri;
    }
    # Legacy hand-written URLs (specific cases must precede the generic rule)
    if ($request_uri ~ "^/index\.html") {
        return 301 https://opossum-dev.com/;
    }
    if ($request_uri ~ "^/GoogleSheetsOrdersSync\.html") {
        return 301 https://opossum-dev.com/google-sheets-orders-sync/;
    }
    # Any remaining *.html -> extension-less, trailing slash
    if ($request_uri ~ "^/(.+)\.html") {
        return 301 https://opossum-dev.com/$1/;
    }

    # Long-lived caching for hashed/static assets
    location ~* \.(?:css|js|mjs|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        try_files $uri =404;
    }

    location / {
        # Force a trailing slash on extension-less page routes so /foo and
        # /foo/ never both resolve. ($uri here is dot-free for pages, so the
        # internal "/index.html" rewrite never matches this.)
        if ($uri ~ "^(/[^.]*[^/.])$") {
            return 301 https://opossum-dev.com$1/;
        }
        try_files $uri $uri/ =404;
    }

    # Serve the prerendered 404 page.
    error_page 404 = @notfound;
    location @notfound {
        try_files /404.html =404;
    }
}
