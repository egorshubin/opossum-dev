# ---------------------------------------------------------------------------
# Opossum Dev — static Nuxt site served by Nginx
# Canonical URL form: https://opossum-dev.com/<path>/  (https, apex, trailing
# slash, no .html). Everything else 301s to the canonical form.
# ---------------------------------------------------------------------------

# 1) HTTP -> HTTPS (apex + www). Keeps the ACME challenge path open for certbot.
server {
    listen 80;
    listen [::]:80;
    server_name opossum-dev.com www.opossum-dev.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://opossum-dev.com$request_uri;
    }
}

# 2) HTTPS www -> apex
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.opossum-dev.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    return 301 https://opossum-dev.com$request_uri;
}

# 3) Canonical site
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name opossum-dev.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:5m;
    ssl_session_timeout 1h;

    root  /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Security + compression
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml font/woff font/woff2;

    # --- SEO redirects: collapse duplicates onto the canonical URL ---

    # Legacy URLs from the old hand-written HTML site
    location = /index.html {
        return 301 https://opossum-dev.com/;
    }
    location = /GoogleSheetsOrdersSync.html {
        return 301 https://opossum-dev.com/google-sheets-orders-sync/;
    }

    # Any remaining *.html -> extension-less, trailing slash
    location ~ ^/(.+)\.html$ {
        return 301 https://opossum-dev.com/$1/;
    }

    # Long-lived caching for hashed/static assets
    location ~* \.(?:css|js|mjs|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        try_files $uri =404;
    }

    location / {
        # Force a trailing slash on page (extension-less) routes so /foo and
        # /foo/ never both resolve.
        if ($uri ~ "^(/[^.]*[^/.])$") {
            return 301 https://opossum-dev.com$1/;
        }
        try_files $uri $uri/ =404;
    }

    # Serve the prerendered 404 page without exposing the .html redirect rule.
    error_page 404 = @notfound;
    location @notfound {
        try_files /404.html =404;
    }
}
