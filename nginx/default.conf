# ---------------------------------------------------------------------------
# Opossum Dev — static Nuxt site served by Nginx on DigitalOcean App Platform.
#
# App Platform terminates TLS at its edge and forwards *plain HTTP* to this
# container on port 8080. There is deliberately NO `ssl` / `listen 443` here —
# that was the Droplet design, and it caused the "400 Bad Request: The plain
# HTTP request was sent to HTTPS port" when App Platform spoke HTTP to :443.
# App Platform also auto-redirects HTTP->HTTPS at the edge, so we don't.
#
# Canonical URL form: https://opossum-dev.com/<path>/  (apex, trailing slash,
# no .html). The SEO redirects below collapse duplicates onto it.
# ---------------------------------------------------------------------------
server {
    listen 8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Security + compression
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml font/woff font/woff2;

    # --- SEO redirects: collapse duplicates onto the canonical URL ---
    # The public scheme is always https at the App Platform edge, so redirect
    # targets are hardcoded to https://opossum-dev.com.

    # www -> apex
    if ($host = www.opossum-dev.com) {
        return 301 https://opossum-dev.com$request_uri;
    }

    # Legacy URLs from the old hand-written HTML site
    location = /index.html {
        return 301 https://opossum-dev.com/;
    }
    location = /GoogleSheetsOrdersSync.html {
        return 301 https://opossum-dev.com/google-sheets-orders-sync/;
    }

    # Any remaining *.html -> extension-less, trailing slash
    location ~ ^/(.+)\.html$ {
        return 301 https://opossum-dev.com/$1/;
    }

    # Long-lived caching for hashed/static assets
    location ~* \.(?:css|js|mjs|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        try_files $uri =404;
    }

    location / {
        # Force a trailing slash on page (extension-less) routes so /foo and
        # /foo/ never both resolve.
        if ($uri ~ "^(/[^.]*[^/.])$") {
            return 301 https://opossum-dev.com$1/;
        }
        try_files $uri $uri/ =404;
    }

    # Serve the prerendered 404 page without exposing the .html redirect rule.
    error_page 404 = @notfound;
    location @notfound {
        try_files /404.html =404;
    }
}
